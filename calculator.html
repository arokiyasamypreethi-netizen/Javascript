<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
      margin: 20px;
      background-color: black;
    }
    button
    {
      margin-bottom: 15px;
      margin-left: 3px;
      
    }
    .numbers
    {
      background-color: rgb(67, 67, 67);
      color: white;
      border: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 20px;
      border-radius: 25px;
      height: 50px;
      width: 50px;
    }
    .symbol
    {
      background-color: rgb(255, 183, 0);
      color: white;
      border: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 24px;
      border-radius: 25px;
      height: 50px;
      width: 50px;
    }
    .clear{
      background-color: rgb(67, 67, 67);
      color: white;
      border: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      border-radius: 25px;
      height: 50px;
      width: 50px;
    }
  </style>
</head>
<body>
  <p style="color: white; font-family: Arial, Helvetica, sans-serif; font-size: large;">Calculator</p>
  <button onclick="calculator += '1' ; console.log(`${calculator}`);" class="numbers">1</button>
  <button onclick="calculator += '2' ; console.log(`${calculator}`);" class="numbers">2</button>
  <button onclick="calculator += '3 '; console.log(`${calculator}`);" class="numbers">3</button>
  <button onclick="calculator += '+' ; console.log(`${calculator}`);" class="symbol">+</button>
  <br>

  <button onclick="calculator += '4 '; console.log(`${calculator}`);" class="numbers">4</button>
  <button onclick="calculator += '5 '; console.log(`${calculator}`);" class="numbers">5</button>
  <button onclick="calculator += '6' ; console.log(`${calculator}`);" class="numbers">6</button>
  <button onclick="calculator += '-' ; console.log(`${calculator}`);" class="symbol">-</button><br>

  <button onclick="calculator += '7 '; console.log(`${calculator}`);" class="numbers">7</button>
  <button onclick="calculator += '8 '; console.log(`${calculator}`);" class="numbers">8</button>
  <button onclick="calculator += '9' ; console.log(`${calculator}`);" class="numbers">9</button>
  <button onclick="calculator += '*' ; console.log(`${calculator}`);" class="symbol">*</button><br>

  <button onclick="calculator += '0' ; console.log(`${calculator}`);" class="numbers">0</button>
  <button onclick="calculator += '.' ; console.log(`${calculator}`);" class="numbers">.</button>
  <button onclick="calculator = eval(calculator)  ; console.log(`${calculator}`);" class="numbers">=</button>
  <button onclick="calculator += '/' ; console.log(`${calculator}`);" class="symbol">/</button><br>

  
  <button onclick="calculator=''; console.log(`Cleared`);" class="clear">Clear</button>
  <script>
    let calculator = '';
  </script>
</body>
</html>
